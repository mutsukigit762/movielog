<!DOCTYPE html>

<html lang="ja" style="overscroll-behavior:none;overflow-x:hidden;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ムービーログ">
<link rel="apple-touch-icon" href="icon.movielog">
<title>映画記録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

button {
-webkit-appearance: none;
appearance: none;
cursor: pointer;
color: inherit;
background: none;
border: none;
font-family: inherit;
}

input, textarea { -webkit-appearance: none; appearance: none; }

body {
font-family: ‘Noto Serif JP’, serif;
background: #f5f2ee;
color: #2a2520;
min-height: 100vh;
padding-bottom: 100px;
overscroll-behavior: none;
overflow-x: hidden;
}

header {
background: #fdfbf8;
border-bottom: 1px solid #ddd8d0;
padding: 20px 20px 16px;
position: sticky;
top: 0;
z-index: 10;
}

header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; color: #2a2520; }

.header-sub {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #9e9890;
margin-top: 2px;
letter-spacing: 0.05em;
}

.header-actions { display: flex; gap: 8px; margin-top: 12px; }

.btn-small {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.04em;
padding: 6px 12px;
border: 1px solid #ddd8d0;
border-radius: 4px;
background: #f5f2ee;
color: #9e9890;
transition: background 0.15s;
}

.btn-small:active { background: #ddd8d0; }

.filter-bar {
padding: 12px 20px;
display: flex;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
background: #fdfbf8;
border-bottom: 1px solid #ddd8d0;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
white-space: nowrap;
padding: 5px 12px;
border-radius: 20px;
border: 1px solid #ddd8d0;
background: transparent;
color: #9e9890;
transition: all 0.15s;
}

.filter-chip.active {
background: #2a2520;
color: #fdfbf8;
border-color: #2a2520;
}

.movie-list {
padding: 16px 20px;
display: flex;
flex-direction: column;
gap: 8px;
}

.empty-state {
text-align: center;
padding: 60px 20px;
color: #9e9890;
font-size: 14px;
line-height: 2;
}

.empty-state .big { font-size: 32px; display: block; margin-bottom: 8px; }

.movie-card {
background: #fdfbf8;
border: 1px solid #ddd8d0;
border-radius: 8px;
padding: 16px;
cursor: pointer;
transition: background 0.15s;
animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

.movie-card:active { background: #f5f2ee; }

.movie-card-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 12px;
}

.movie-title { font-size: 15px; font-weight: 600; line-height: 1.5; flex: 1; color: #2a2520; }

.movie-tags { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

.tag {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
padding: 2px 8px;
border-radius: 3px;
text-align: center;
letter-spacing: 0.03em;
}

.tag-done     { background: #2a2520; color: #fff; }
.tag-unwatched{ background: #ddd8d0; color: #9e9890; }
.tag-theater  { background: #5c4a3a; color: #fff; }
.tag-streaming{ background: #7a8c7a; color: #fff; }
.tag-disc     { background: #6a7a8c; color: #fff; }
.tag-other    { background: #8c8070; color: #fff; }

.movie-director { font-size: 12px; color: #9e9890; margin-top: 4px; }

.movie-date {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #9e9890;
margin-top: 10px;
}

.movie-review-preview {
font-size: 12px;
color: #9e9890;
margin-top: 8px;
line-height: 1.6;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.fab {
position: fixed;
bottom: 24px;
right: 24px;
width: 56px;
height: 56px;
border-radius: 50%;
background: #2a2520;
color: #fdfbf8;
font-size: 24px;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 4px 16px rgba(0,0,0,0.2);
transition: transform 0.15s;
z-index: 10;
}

.fab:active { transform: scale(0.92); }

.modal-overlay {
display: none;
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.4);
z-index: 9999;
align-items: flex-end;
}

.modal-overlay.open { display: flex; }

.modal {
background: #fdfbf8;
border-radius: 16px 16px 0 0;
width: 100%;
max-width: 100vw;
max-height: 82dvh;
max-height: 82vh;
overflow-x: hidden;
overflow-y: scroll;
-webkit-overflow-scrolling: touch;
overscroll-behavior-x: none;
overscroll-behavior-y: contain;
padding: 0 0 48px;
animation: slideUp 0.25s ease;
position: relative;
z-index: 10000;
}

@keyframes slideUp {
from { transform: translateY(40px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
width: 36px; height: 4px;
background: #ddd8d0;
border-radius: 2px;
margin: 12px auto 0;
}

.modal-header {
padding: 20px 20px 0;
display: flex;
justify-content: space-between;
align-items: center;
}

.modal-title { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; color: #2a2520; }

.modal-close {
width: 32px; height: 32px;
background: #f5f2ee;
border-radius: 50%;
font-size: 18px;
display: flex;
align-items: center;
justify-content: center;
color: #9e9890;
}

.modal-body {
padding: 20px;
display: flex;
flex-direction: column;
gap: 16px;
width: 100%;
box-sizing: border-box;
}

.field-label {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.06em;
color: #9e9890;
margin-bottom: 6px;
display: block;
}

.date-picker {
display: flex;
gap: 8px;
}

.date-picker select {
-webkit-appearance: none;
appearance: none;
flex: 1;
font-family: ‘Noto Serif JP’, serif;
font-size: 14px;
color: #2a2520;
background: #f5f2ee;
border: 1px solid #ddd8d0;
border-radius: 6px;
padding: 10px 8px;
outline: none;
text-align: center;
box-sizing: border-box;
}

.date-picker select:focus { border-color: #2a2520; }

.required-mark { color: #c0392b; margin-left: 3px; }

.modal-body > div { width: 100%; }

textarea {
-webkit-appearance: none;
appearance: none;
width: 100%;
font-family: ‘Noto Serif JP’, serif;
font-size: 14px;
color: #2a2520;
background: #f5f2ee;
border: 1px solid #ddd8d0;
border-radius: 6px;
padding: 10px 12px;
outline: none;
transition: border-color 0.15s;
display: block;
box-sizing: border-box;
-webkit-box-sizing: border-box;
resize: none;
min-height: 100px;
line-height: 1.7;
}

.input-single {
min-height: unset;
height: auto;
line-height: 1.5;
overflow: hidden;
}

.toggle-group {
display: flex;
border: 1px solid #ddd8d0;
border-radius: 6px;
overflow: hidden;
}

.toggle-btn {
flex: 1;
padding: 9px 0;
font-family: ‘Noto Serif JP’, serif;
font-size: 13px;
color: #9e9890;
background: transparent;
transition: all 0.15s;
text-align: center;
}

.toggle-btn:not(:last-child) { border-right: 1px solid #ddd8d0; }
.toggle-btn.active { background: #2a2520; color: #fdfbf8; }

.btn-primary {
width: 100%;
padding: 14px;
background: #2a2520;
color: #fdfbf8;
font-family: ‘Noto Serif JP’, serif;
font-size: 15px;
font-weight: 600;
letter-spacing: 0.06em;
border-radius: 8px;
transition: opacity 0.15s;
}

.btn-primary:active { opacity: 0.8; }

.btn-danger {
width: 100%;
padding: 12px;
background: transparent;
color: #c0392b;
border: 1px solid #c0392b;
border-radius: 8px;
font-family: ‘Noto Serif JP’, serif;
font-size: 14px;
transition: all 0.15s;
}

.btn-danger:active { background: #c0392b; color: #fff; }

.detail-field { border-bottom: 1px solid #ddd8d0; padding-bottom: 16px; }
.detail-field:last-of-type { border-bottom: none; }
.detail-value { font-size: 14px; line-height: 1.8; white-space: pre-wrap; margin-top: 4px; color: #2a2520; }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
</style>

</head>
<body>

<header>
  <h1>映画記録</h1>
  <div class="header-sub" id="totalCount">0 films</div>
  <div class="header-actions">
    <button class="btn-small" onclick="exportJSON()">↓ エクスポート</button>
    <button class="btn-small" onclick="document.getElementById('importFile').click()">↑ インポート</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</header>

<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-chip" onclick="setFilter('done',this)">鑑賞済</button>
  <button class="filter-chip" onclick="setFilter('unwatched',this)">未鑑賞</button>
  <button class="filter-chip" onclick="setFilter('theater',this)">劇場</button>
  <button class="filter-chip" onclick="setFilter('streaming',this)">配信</button>
  <button class="filter-chip" onclick="setFilter('disc',this)">円盤</button>
  <button class="filter-chip" onclick="setFilter('other',this)">その他</button>
</div>

<div class="movie-list" id="movieList"></div>

<button class="fab" onclick="openAddModal()">＋</button>

<!-- 編集モーダル -->

<div class="modal-overlay" id="editModal" onclick="handleOverlayClick(event,'editModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="editModalTitle">新しい映画</span>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="field-label">タイトル <span class="required-mark">*</span></label>
        <textarea id="inputTitle" placeholder="映画タイトル" rows="1" class="input-single"></textarea>
      </div>
      <div>
        <label class="field-label">監督</label>
        <textarea id="inputDirector" placeholder="監督名" rows="1" class="input-single"></textarea>
      </div>
      <div>
        <label class="field-label">鑑賞日</label>
        <input type="date" id="inputDate" style="width:100%;font-family:'Noto Serif JP',serif;font-size:14px;color:#2a2520;background:#f5f2ee;border:1px solid #ddd8d0;border-radius:6px;padding:10px 12px;outline:none;display:block;box-sizing:border-box;color-scheme:light;">
      </div>
      <div>
        <label class="field-label">鑑賞状況</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btnDone" onclick="setStatus('done')">鑑賞済</button>
          <button class="toggle-btn" id="btnUnwatched" onclick="setStatus('unwatched')">未鑑賞</button>
        </div>
      </div>
      <div>
        <label class="field-label">鑑賞方法</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btnTheater" onclick="setSource('theater')">劇場</button>
          <button class="toggle-btn" id="btnStreaming" onclick="setSource('streaming')">配信</button>
          <button class="toggle-btn" id="btnDisc" onclick="setSource('disc')">円盤</button>
          <button class="toggle-btn" id="btnOther" onclick="setSource('other')">その他</button>
        </div>
      </div>
      <div>
        <label class="field-label">感想・メモ</label>
        <textarea id="inputReview" placeholder="感想、印象に残ったシーン、メモなど…"></textarea>
      </div>
      <button class="btn-primary" onclick="saveMovie()">保存する</button>
      <button class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteMovie()">この記録を削除する</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->

<div class="modal-overlay" id="detailModal" onclick="handleOverlayClick(event,'detailModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">詳細</span>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<script>
  let movies = JSON.parse(localStorage.getItem('movies_log') || '[]');
  let currentFilter = 'all';
  let editingId = null;
  let currentStatus = 'done';
  let currentSource = 'theater';

  function save() { localStorage.setItem('movies_log', JSON.stringify(movies)); }

  function handleOverlayClick(e, modalId) {
    if (e.target === document.getElementById(modalId)) {
      if (modalId === 'editModal') closeEditModal();
      else closeDetailModal();
    }
  }

  function openModal(id) {
    const el = document.getElementById(id);
    el.style.display = 'flex';
    requestAnimationFrame(() => el.classList.add('open'));
    document.body.style.overflow = 'hidden';
  }

  function closeModal(id) {
    const el = document.getElementById(id);
    el.classList.remove('open');
    el.style.display = 'none';
    document.body.style.overflow = '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const sourceLabel = { theater:'劇場', streaming:'配信', disc:'円盤', other:'その他' };
  const sourceClass = { theater:'tag-theater', streaming:'tag-streaming', disc:'tag-disc', other:'tag-other' };

  function getFiltered() {
    if (currentFilter === 'all') return movies;
    if (currentFilter === 'done') return movies.filter(m => m.status === 'done');
    if (currentFilter === 'unwatched') return movies.filter(m => m.status === 'unwatched');
    return movies.filter(m => m.source === currentFilter);
  }

  function render() {
    const list = document.getElementById('movieList');
    const filtered = getFiltered();
    document.getElementById('totalCount').textContent = movies.length + ' films';

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <span class="big">🎬</span>
        ${movies.length === 0 ? '＋ボタンで最初の一本を記録しよう' : 'この条件の映画はまだない'}
      </div>`;
      return;
    }

    const sorted = [...filtered].sort((a, b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return b.date.localeCompare(a.date);
    });

    list.innerHTML = sorted.map(m => `
      <div class="movie-card" onclick="openDetail('${m.id}')">
        <div class="movie-card-top">
          <div style="flex:1">
            <div class="movie-title">${esc(m.title)}</div>
            ${m.director ? `<div class="movie-director">${esc(m.director)}</div>` : ''}
          </div>
          <div class="movie-tags">
            <span class="tag ${m.status==='done'?'tag-done':'tag-unwatched'}">${m.status==='done'?'鑑賞済':'未鑑賞'}</span>
            <span class="tag ${sourceClass[m.source]||'tag-other'}">${sourceLabel[m.source]||'その他'}</span>
          </div>
        </div>
        ${m.date ? `<div class="movie-date">${m.date}</div>` : ''}
        ${m.review ? `<div class="movie-review-preview">${esc(m.review)}</div>` : ''}
      </div>
    `).join('');
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function openAddModal() {
    editingId = null;
    currentStatus = 'done';
    currentSource = 'theater';
    document.getElementById('editModalTitle').textContent = '新しい映画';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputDirector').value = '';
    document.getElementById('inputDate').value = '';
    document.getElementById('inputReview').value = '';
    document.getElementById('deleteBtn').style.display = 'none';
    updateStatusUI();
    updateSourceUI();
    openModal('editModal');
  }

  function openEditModal(id) {
    const m = movies.find(x => x.id === id);
    if (!m) return;
    editingId = id;
    currentStatus = m.status || 'done';
    currentSource = m.source || 'theater';
    document.getElementById('editModalTitle').textContent = '編集';
    document.getElementById('inputTitle').value = m.title;
    document.getElementById('inputDirector').value = m.director || '';
    document.getElementById('inputDate').value = m.date || '';
    document.getElementById('inputReview').value = m.review || '';
    document.getElementById('deleteBtn').style.display = 'block';
    updateStatusUI();
    updateSourceUI();
    closeDetailModal();
    openModal('editModal');
  }

  function closeEditModal() { closeModal('editModal'); }

  function setStatus(s) { currentStatus = s; updateStatusUI(); }
  function setSource(s) { currentSource = s; updateSourceUI(); }

  function updateStatusUI() {
    document.getElementById('btnDone').classList.toggle('active', currentStatus === 'done');
    document.getElementById('btnUnwatched').classList.toggle('active', currentStatus === 'unwatched');
  }

  function updateSourceUI() {
    ['theater','streaming','disc','other'].forEach(s => {
      document.getElementById('btn' + s.charAt(0).toUpperCase() + s.slice(1))
        .classList.toggle('active', currentSource === s);
    });
  }

  function saveMovie() {
    const title = document.getElementById('inputTitle').value.trim().replace(/\n/g, '');
    if (!title) {
      const el = document.getElementById('inputTitle');
      el.focus();
      el.style.borderColor = '#c0392b';
      setTimeout(() => el.style.borderColor = '', 1500);
      return;
    }
    const movie = {
      id: editingId || Date.now().toString(),
      title,
      director: document.getElementById('inputDirector').value.trim().replace(/\n/g, ''),
      date: document.getElementById('inputDate').value,
      status: currentStatus,
      source: currentSource,
      review: document.getElementById('inputReview').value.trim(),
      updatedAt: new Date().toISOString()
    };
    if (editingId) {
      const idx = movies.findIndex(m => m.id === editingId);
      if (idx !== -1) movies[idx] = movie;
    } else {
      movies.unshift(movie);
    }
    save();
    render();
    closeEditModal();
  }

  function deleteMovie() {
    if (!editingId) return;
    if (!confirm('この記録を削除する？')) return;
    movies = movies.filter(m => m.id !== editingId);
    save();
    render();
    closeEditModal();
  }

  function openDetail(id) {
    const m = movies.find(x => x.id === id);
    if (!m) return;
    document.getElementById('detailBody').innerHTML = `
      <div>
        <h2 style="font-size:18px;font-weight:600;line-height:1.6;color:#2a2520">${esc(m.title)}</h2>
        ${m.director ? `<p style="font-size:13px;color:#9e9890;margin-top:4px">${esc(m.director)}</p>` : ''}
      </div>
      <div class="detail-tags">
        <span class="tag ${m.status==='done'?'tag-done':'tag-unwatched'}">${m.status==='done'?'鑑賞済':'未鑑賞'}</span>
        <span class="tag ${sourceClass[m.source]||'tag-other'}">${sourceLabel[m.source]||'その他'}</span>
      </div>
      ${m.date ? `<div class="detail-field">
        <span class="field-label">鑑賞日</span>
        <div class="detail-value">${m.date}</div>
      </div>` : ''}
      ${m.review ? `<div class="detail-field">
        <span class="field-label">感想・メモ</span>
        <div class="detail-value">${esc(m.review)}</div>
      </div>` : ''}
      <button class="btn-small" style="width:100%;padding:10px;text-align:center;color:#2a2520" onclick="openEditModal('${m.id}')">編集する</button>
    `;
    openModal('detailModal');
  }

  function closeDetailModal() { closeModal('detailModal'); }

  function exportJSON() {
    if (movies.length === 0) { alert('記録がまだない'); return; }
    const blob = new Blob([JSON.stringify(movies, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'movies_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        if (!confirm(data.length + '件のデータをインポートする？')) return;
        const existingIds = new Set(movies.map(m => m.id));
        const newMovies = data.filter(m => !existingIds.has(m.id));
        movies = [...movies, ...newMovies];
        save();
        render();
        alert(newMovies.length + '件追加した');
      } catch {
        alert('読み込みに失敗した。正しいJSONファイルか確認して');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  render();

  ['inputTitle', 'inputDirector'].forEach(function(id) {
    document.getElementById(id).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') e.preventDefault();
    });
  });
</script>

</body>
</html>
